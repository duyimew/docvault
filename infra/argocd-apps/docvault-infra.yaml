apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docvault-infra-deps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/daithang59/docvault.git'
    targetRevision: gitops-testing
    path: infra/k8s/infra-deps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: docvault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
