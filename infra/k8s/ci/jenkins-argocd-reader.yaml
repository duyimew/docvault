apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-argocd-reader
  namespace: argocd
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-argocd-reader-token
  namespace: argocd
  annotations:
    kubernetes.io/service-account.name: jenkins-argocd-reader
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-argocd-reader
  namespace: argocd
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-argocd-reader
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: jenkins-argocd-reader
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-argocd-reader
