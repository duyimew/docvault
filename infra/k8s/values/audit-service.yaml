# audit-service values
namespace: docvault

image:
  repository: daithang59/audit-service
  tag: "v47"
  digest: "sha256:c87bf5480999f24422041b71efc0bc78fdbf13325f919c5c95c1987511136d3b"

healthPath: /health

service:
  type: ClusterIP
  port: 3004
env:
  NODE_ENV: production
  PORT: "3004"
  KEYCLOAK_BASE_URL: "http://keycloak:8080"
  # Patched at runtime by scripts/setup-eks-access.ps1 to the public
  # Keycloak NodePort issuer while JWKS stays on KEYCLOAK_BASE_URL.
  KEYCLOAK_ISSUER: "http://keycloak:8080/realms/docvault"
  KEYCLOAK_REALM: "docvault"
  KEYCLOAK_AUDIENCE: "docvault-gateway"

envFrom:
  - secretRef:
      name: docvault-app-secrets
