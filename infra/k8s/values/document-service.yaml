# document-service values
namespace: docvault

image:
  repository: daithang59/document-service
  tag: "v25"
  digest: "sha256:e356b7e0c2c2dc95a8d3e19b1239ab7a09a1b9dfbae8881b5dac939231a9a00d"

healthPath: /health

service:
  type: ClusterIP
  port: 3002
env:
  NODE_ENV: production
  PORT: "3002"
  KEYCLOAK_BASE_URL: "http://keycloak:18080"
  KEYCLOAK_REALM: "docvault"
  KEYCLOAK_AUDIENCE: "docvault-gateway"
  METADATA_SERVICE_URL: "http://docvault-metadata:3001"
  AUDIT_SERVICE_URL: "http://docvault-audit-service:3004"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "docvault"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"

envFrom:
  - secretRef:
      name: docvault-app-secrets
