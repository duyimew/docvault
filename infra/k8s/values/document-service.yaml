# document-service values
namespace: docvault

image:
  repository: daithang59/document-service
  tag: "v44"
  digest: "sha256:e1ff6cc0cf18bb0e01f2f4e13170c7c87dabb0d7e42ce57a81a5cd1d08407eec"

healthPath: /health

service:
  type: ClusterIP
  port: 3002
env:
  NODE_ENV: production
  PORT: "3002"
  KEYCLOAK_BASE_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "docvault"
  KEYCLOAK_AUDIENCE: "docvault-gateway"
  METADATA_SERVICE_URL: "http://docvault-metadata:3001"
  AUDIT_SERVICE_URL: "http://docvault-audit-service:3004"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "docvault"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"

envFrom:
  - secretRef:
      name: docvault-app-secrets

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
