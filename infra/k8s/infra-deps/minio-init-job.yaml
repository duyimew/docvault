apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      initContainers:
        # Wait for MinIO to be reachable before running mc commands
        - name: wait-for-minio
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until wget -qO- http://minio:9000/minio/health/live >/dev/null 2>&1; do
                echo "MinIO not ready, retrying in 3s..."
                sleep 3
              done
              echo "MinIO is ready!"
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: mc
          image: minio/mc:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p "local/$MINIO_BUCKET" || true
              mc encrypt set sse-s3 "local/$MINIO_BUCKET" || true
              echo "MinIO init done: bucket=$MINIO_BUCKET (SSE-S3 enabled)"
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadminpw"
            - name: MINIO_BUCKET
              value: "docvault"
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: tmp
          emptyDir: {}
