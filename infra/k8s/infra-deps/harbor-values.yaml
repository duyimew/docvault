expose:
  type: nodePort
  tls:
    enabled: false
externalURL: http://harbor.local:30002

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 10Gi
    jobservice:
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 1Gi
    database:
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 1Gi
    redis:
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 1Gi
    trivy:
      storageClass: "local-path"
      accessMode: ReadWriteOnce
      size: 5Gi

harborAdminPassword: Harbor12345
