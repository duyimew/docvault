apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: docvault
  POSTGRES_PASSWORD: docvaultpw
  POSTGRES_DB: docvault_metadata
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- docvault_audit database
    CREATE DATABASE docvault_audit;
    \connect docvault_audit
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- docvault_metadata database
    \connect postgres
    CREATE DATABASE docvault_metadata;
    \connect docvault_metadata
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE TABLE IF NOT EXISTS _bootstrap (
      id uuid PRIMARY KEY DEFAULT uuid_generate_v4(),
      created_at timestamptz NOT NULL DEFAULT now()
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: db
    component: postgres
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
      component: postgres
  template:
    metadata:
      labels:
        app: db
        component: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-tmp
              mountPath: /tmp
            - name: postgres-run
              mountPath: /var/run/postgresql
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init-sql
        - name: postgres-tmp
          emptyDir: {}
        - name: postgres-run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: docvault-gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
    component: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
