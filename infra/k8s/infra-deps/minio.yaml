apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: minio
    component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
      component: minio
  template:
    metadata:
      labels:
        app: minio
        component: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-01-20T14-49-07Z
          args: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
          securityContext:
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadminpw"
          volumeMounts:
            - name: minio-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: docvault-gp3
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector:
    app: minio
    component: minio
  ports:
    - name: api
      protocol: TCP
      port: 9000
      targetPort: 9000
    - name: console
      protocol: TCP
      port: 9001
      targetPort: 9001
